    <!-- Design System (Tailwind Components) -->
    <style type="text/tailwindcss">
        @layer components {
            /* 1. Boutons & Elements Interactifs */
            .btn-primary {
                @apply bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 hover:from-blue-500 hover:via-indigo-500 hover:to-purple-500 border-indigo-400/50 hover:border-indigo-300 shadow-[0_0_20px_rgba(99,102,241,0.5)] hover:shadow-[0_0_30px_rgba(99,102,241,0.8)] text-white transform hover:scale-105 border px-5 py-2 rounded-xl text-xs font-extrabold uppercase tracking-widest flex items-center gap-2.5 transition-all duration-300 relative overflow-hidden;
            }
            .btn-secondary {
                @apply bg-white/5 border border-white/5 hover:bg-white/10 hover:border-slate-400 text-[#f1f5f9] px-3.5 py-1.5 rounded-lg text-xs font-medium flex items-center gap-2 transition;
            }
            .btn-danger {
                @apply bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 hover:border-red-500/40 px-3 py-1 rounded-md text-xs font-semibold uppercase tracking-wider transition;
            }
            
            /* 2. Navigation (Sidebar) */
            .nav-item-base {
                @apply w-full flex items-start gap-2.5 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 text-left relative group overflow-hidden;
            }
            .nav-item-active {
                @apply bg-gradient-to-r from-blue-600/20 to-blue-600/5 border border-blue-500/20 text-blue-300 font-bold;
            }
            .nav-item-inactive {
                @apply text-slate-400 hover:text-slate-200 hover:bg-white/5 border border-transparent hover:border-white/8;
            }
            .nav-section-title {
                @apply text-[9px] font-extrabold text-slate-600 uppercase tracking-[0.14em] px-3 mb-1.5 flex items-center gap-2;
            }

            /* 3. Cartes et Panneaux */
            .pres-card {
                @apply bg-white/5 border border-white/10 rounded-xl p-4 text-center;
            }
            .inner-panel {
                @apply bg-slate-900/60 border border-white/5 rounded-xl p-3;
            }
            .code-panel {
                @apply bg-slate-950 rounded-lg p-4 border border-white/5 overflow-auto;
            }

            /* 4. Typographie & Labels */
            .label-subtext {
                @apply text-[10px] text-slate-500 uppercase tracking-wider mt-0.5;
            }
            .panel-header-title {
                @apply text-[9px] font-bold text-slate-300 uppercase tracking-widest;
            }
            .metric-value {
                @apply font-mono font-extrabold text-white leading-none;
            }

            /* 5. Badges & Icones */
            .badge-emerald {
                @apply flex items-center gap-1.5 bg-emerald-500/10 border border-emerald-500/20 px-2.5 py-1.5 rounded-lg text-emerald-400 font-mono font-bold text-[9px];
            }
            .icon-box-blue {
                @apply w-9 h-9 rounded-lg bg-blue-500/10 flex items-center justify-center flex-shrink-0 text-blue-400;
            }
            .icon-box-emerald {
                @apply w-9 h-9 rounded-lg bg-emerald-500/10 flex items-center justify-center flex-shrink-0 text-emerald-400;
            }
            .icon-box-purple {
                @apply w-9 h-9 rounded-lg bg-purple-500/10 flex items-center justify-center flex-shrink-0 text-purple-400;
            }
        }
